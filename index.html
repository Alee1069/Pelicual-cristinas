<!DOCTYPE html>
<html>
<head>
<title>Películas Cristianas</title>

<style>

body{
background:#0b1a2a;
color:white;
font-family:Arial;
padding:30px;
}

h1{
margin-bottom:30px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
}

/* TARJETA */

.card{
position:relative;
cursor:pointer;
border-radius:15px;
overflow:hidden;
}

.card img{
width:100%;
display:block;
transition:0.4s;
}

.card:hover img{
transform:scale(1.08);
filter:brightness(70%);
}

/* BOTON PLAY */

.play{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:50px;
color:white;
opacity:0;
transition:0.3s;
}

.card:hover .play{
opacity:1;
}

/* OVERLAY VIDEO */

#overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
z-index:1000;
}

#overlay iframe{
width:100%;
height:100%;
border:none;
}

/* BOTON CERRAR */

#cerrar{
position:absolute;
top:20px;
right:30px;
font-size:40px;
color:white;
cursor:pointer;
z-index:2000;
}

</style>
</head>

<div id="overlay">

<div id="cerrar" onclick="cerrarVideo()">✕</div>

<iframe
id="videoFrame"
tabindex="0"
allow="autoplay; fullscreen; encrypted-media"
allowfullscreen
frameborder="0">
</iframe>

</div>

<script>

function verVideo(link){

let overlay = document.getElementById("overlay");
let frame = document.getElementById("videoFrame");

overlay.style.display="block";

let embed = link.replace("/video/","/videoembed/") + "?autoplay=1";

frame.src = embed;

/* permitir control remoto */
setTimeout(()=>{
frame.focus();
},500);

if(frame.requestFullscreen){
frame.requestFullscreen();
}

}

function cerrarVideo(){

let overlay = document.getElementById("overlay");
let frame = document.getElementById("videoFrame");

overlay.style.display="none";
frame.src="";

if(document.fullscreenElement){
document.exitFullscreen();
}

}

</script>
